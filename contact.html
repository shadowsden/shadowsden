<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact – Shadow's Den</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .contact-card {
      max-width: 680px;
      margin: 0 auto; /* FIX: centers the card horizontally within the page.
                          Without this, max-width alone just limits the
                          card's width but leaves it stuck to the left edge. */
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
    }
    .contact-card .moon { font-size: 48px; color: var(--gold); margin-bottom: 24px; }
    .contact-card h2 {
      color: var(--text);
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 16px;
      line-height: 1.3;
    }
    .contact-card p {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
      margin-bottom: 40px;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }
    .discord-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--discord);
      color: #fff;
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      font-family: sans-serif;
      transition: background 0.2s, transform 0.15s;
    }
    .discord-btn:hover {
      background: #4752C4;
      transform: translateY(-2px);
    }
    .contact-note {
      border-top: 1px solid var(--border);
      margin-top: 40px;
      padding-top: 28px;
      color: var(--muted);
      font-size: 13px;
      font-family: monospace;
      letter-spacing: 0.05em;
    }
    @media (max-width: 768px) {
      .contact-card { padding: 32px 20px; }
      .contact-card h2 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <main>
    <div class="page-inner">
      <div class="section-header">
        <h1>Contact</h1>
        <div class="gold-line"></div>
      </div>
      <div class="contact-card">
        <div class="moon">☽</div>
        <h2>Want to get in touch?</h2>
        <p>The best way to reach me is through Discord. </p>
        <a href="https://discord.gg/jeg22GvzEQ" target="_blank" rel="noopener noreferrer" class="discord-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
          </svg>
          Join my Discord
        </a>
        <div class="contact-note">I try to respond within a few days ✦</div>
      </div>
    </div>
  </main>
  <script src="components.js"></script>
</body>
</html>
