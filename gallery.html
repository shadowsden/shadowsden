<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery – Shadow's Den</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/photoswipe@5.4.3/dist/photoswipe.min.css">
  <style>
    #gallery-wrap { padding: 48px 24px; max-width: 1200px; margin: 0 auto; }

    /* Masonry grid */
    #gallery-grid {
      columns: 3;
      column-gap: 6px;
    }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 6px;
      cursor: pointer;
      overflow: hidden;
      border-radius: 4px;
      background: var(--bg-card);
      position: relative;
    }

    .gallery-item img {
      width: 100%;
      display: block;
      opacity: 0;
      transition: opacity 0.4s ease, transform 0.3s ease;
    }

    .gallery-item img.loaded { opacity: 1; }
    .gallery-item:hover img { transform: scale(1.03); }

    .skeleton {
      width: 100%;
      padding-top: 75%;
      background: linear-gradient(90deg, #0f2218 25%, #163020 50%, #0f2218 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    #gallery-sentinel {
      width: 100%;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 12px;
    }

    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #gallery-empty {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 80px 24px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 16px;
    }

    #gallery-empty .moon { font-size: 48px; color: var(--gold); margin-bottom: 16px; }

    @media (max-width: 900px) { #gallery-grid { columns: 2; } }
    @media (max-width: 500px) { #gallery-grid { columns: 1; } }
  </style>
</head>
<body>
  <main>
    <div id="gallery-wrap">
      <div class="section-header">
        <h1>Gallery</h1>
        <div class="gold-line"></div>
      </div>

      <div id="gallery-grid"></div>
      <div id="gallery-sentinel"><div class="spinner" id="spinner"></div></div>
      <div id="gallery-empty">
        <div class="moon">☽</div>
        <p>No images yet.<br></p>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/photoswipe@5.4.3/dist/photoswipe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/photoswipe@5.4.3/dist/photoswipe-lightbox.min.js"></script>
  <script>
  (function () {
    const IMAGES_PATH = './images/';
    const INDEX_FILE  = './images/index.json';
    const BATCH_SIZE  = 12;

    const grid     = document.getElementById('gallery-grid');
    const sentinel = document.getElementById('gallery-sentinel');
    const spinner  = document.getElementById('spinner');
    const empty    = document.getElementById('gallery-empty');

    let imageList = [];
    let cursor    = 0;
    let loading   = false;
    let exhausted = false;
    let pswpItems = [];
    let lightbox  = null;

    async function loadIndex() {
      try {
        const res = await fetch(INDEX_FILE + '?_=' + Date.now());
        if (!res.ok) throw new Error('not found');
        const data = await res.json();
        imageList = Array.isArray(data) ? data : (data.images || []);
      } catch {
        imageList = await buildNumericList();
      }

      if (imageList.length === 0) {
        spinner.style.display = 'none';
        empty.style.display = 'flex';
        return;
      }

      initLightbox();
      loadNextBatch();
    }

    async function buildNumericList() {
      const list = [];
      let i = 1;
      while (true) {
        try {
          const res = await fetch(IMAGES_PATH + i + '.jpg', { method: 'HEAD' });
          if (!res.ok) break;
          list.push(i + '.jpg');
          i++;
        } catch { break; }
      }
      return list;
    }

    function loadNextBatch() {
      if (loading || exhausted) return;
      loading = true;

      const batch = imageList.slice(cursor, cursor + BATCH_SIZE);
      if (!batch.length) {
        exhausted = true;
        spinner.style.display = 'none';
        loading = false;
        return;
      }

      batch.forEach((filename, bi) => {
        const idx = cursor + bi;
        const item = document.createElement('div');
        item.className = 'gallery-item';

        const skel = document.createElement('div');
        skel.className = 'skeleton';
        item.appendChild(skel);

        const img = document.createElement('img');
        img.loading = 'lazy';
        img.alt = filename;
        img.src = IMAGES_PATH + filename;

        img.onload = function () {
          skel.remove();
          item.appendChild(img);
          requestAnimationFrame(() => img.classList.add('loaded'));
          pswpItems[idx] = { src: img.src, w: img.naturalWidth, h: img.naturalHeight };
        };

        img.onerror = () => item.remove();
        item.addEventListener('click', () => openLightbox(idx));
        grid.appendChild(item);
      });

      cursor += batch.length;
      if (cursor >= imageList.length) {
        exhausted = true;
        spinner.style.display = 'none';
      }
      loading = false;
    }

    function initLightbox() {
      lightbox = new PhotoSwipeLightbox({
        dataSource: {
          getItemData: (i) => ({
            src: (pswpItems[i] || {}).src || '',
            width: (pswpItems[i] || {}).w || 1200,
            height: (pswpItems[i] || {}).h || 900,
          }),
          getItemsCount: () => imageList.length,
        },
        pswpModule: PhotoSwipe,
        bgOpacity: 0.95,
        showHideAnimationType: 'zoom',
        closeOnVerticalDrag: true,
      });
      lightbox.init();
    }

    function openLightbox(index) {
      if (lightbox) lightbox.loadAndOpen(index);
    }

    new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting && !exhausted) loadNextBatch();
    }, { rootMargin: '200px' }).observe(sentinel);

    loadIndex();
  })();
  </script>
  <script src="components.js"></script>
</body>
</html>
