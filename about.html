<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About Me – Shadow's Den</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .about-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 760px;
    }

    .about-section { margin-bottom: 40px; }
    .about-section:last-child { margin-bottom: 0; }

    .about-section h2 {
      color: var(--gold);
      font-size: 13px;
      font-family: monospace;
      letter-spacing: 0.12em;
      margin-bottom: 12px;
    }

    .about-section p {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.8;
    }

    .about-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }

    @media (max-width: 768px) {
      .about-card { padding: 32px 20px; }
      .about-section p { font-size: 15px; }
    }
  </style>
</head>
<body>
  <main>
    <div class="page-inner">
      <div class="section-header">
        <h1>About Me</h1>
        <div class="gold-line"></div>
      </div>

      <div class="about-card">

        <!-- ============================================================
             EASY EDIT ZONE — Change the text between the <p> tags below.
             Each section has a label so you know what it's for.
             ============================================================ -->

        <!-- WHO YOU ARE -->
        <div class="about-section">
          <h2>WHO I AM</h2>
          <p>
            <!-- ✏️ Edit this: Write a short intro about yourself -->
            Work In progress check back soon.
          </p>
        </div>

        <hr class="about-divider">

        <!-- WHAT YOU DO / YOUR INTERESTS -->
        <div class="about-section">
          <h2>WHAT I DO</h2>
          <p>
            <!-- ✏️ Edit this: Describe what you create, your hobbies, or interests -->
            Work In progress check back soon.
          </p>
        </div>

        <hr class="about-divider">

        <!-- YOUR STORY / BACKGROUND -->
        <div class="about-section">
          <h2>MY STORY</h2>
          <p>
            <!-- ✏️ Edit this: Share a bit of your background or how you got into what you do -->
            Work In progress check back soon.
          </p>
        </div>

        <hr class="about-divider">

        <!-- GET IN TOUCH -->
        <div class="about-section">
          <h2>GET IN TOUCH</h2>
          <p>
            <!-- ✏️ Edit this: How people can reach you -->
            The best way to reach me is through <a href="contact.html" style="color:var(--gold);">Discord</a>.
          </p>
        </div>

        <!-- ============================================================
             END EASY EDIT ZONE
             ============================================================ -->

      </div>
    </div>
  </main>

  <script src="components.js"></script>
</body>
</html>
